# Locked scope — change only with good reason and document why

data:
  # NOTE: binanceus is used because binance.com is geo-blocked in the US. It is
  # far thinner than binance.com — ~50% of ETH 1-min bars are flat (no trade),
  # which makes 5-min RV degenerate at the low end. We handle this with an RV
  # noise floor (see realized_vol.rv_floor). If you can source binance.com,
  # Kraken, or Coinbase data, prefer it: the liquidity is materially better.
  exchange: binanceus
  symbols:
    - BTC/USDT
    - ETH/USDT
  timeframe: 1m                    # 1-minute OHLCV bars
  start_date: "2020-01-01"
  end_date:   "2023-12-31"
  raw_dir:  data/raw
  proc_dir: data/processed

cleaning:
  wick_threshold: 0.15             # clip 1-min high/low wicks beyond ±15% of the candle body
                                   # (kills bad single-tick prints the close filter misses)

realized_vol:
  subsampling_freq: 5              # minutes — classic 5-min compromise against microstructure noise
  estimator: yang_zhang            # noise-robust estimator (handles overnight gaps cleanly in crypto too)
  forecast_horizon: 30             # minutes ahead for target RV
  rv_floor: 1.0e-8                 # variance floor (~3% annualised vol) applied to RV target + lags
                                   # before logging; prevents flat illiquid bars (RV≈0) from
                                   # producing log(0) artifacts that dominate MSE-on-log

har:
  lags:
    short:  [1, 5]                 # 1–5 min lags → "daily" component
    medium: [6, 30]                # 6–30 min lags → "weekly" component
    long:   [31, 480]              # 31–480 min lags → "monthly" component

tda:
  # HIGH FREQUENCY (locked): the embedding uses 1-MINUTE log-returns and is never
  # downsampled. step_size=5 only sets where a feature row is emitted (one per 5-min
  # RV bar). See src/features/tda.py for the full pipeline.
  embedding_dim: 3                 # m   — delay-embedding dimension (tune via false-nearest-neighbors)
  embedding_delay: 1               # tau — delay in 1-min bars (tune via mutual information)
  window_size: 60                  # minutes of 1-min returns per sliding window
  step_size: 5                     # minutes between windows (= RV grid spacing)
  max_homology_dim: 1              # H0 + H1 only (H2 is stretch goal)
  ret_scale: 100.0                 # GLOBAL scale (log-ret → ~percent); preserves cross-window
                                   #   volatility scale (Souto-faithful), conditions ripser numerics
  standardize: none                # "none" keeps volatility scale | "zscore" = scale-free (ablation)
  sig_threshold: 0.10              # min H1 lifetime to count as a "significant" loop
  min_distinct: 8                  # < this many distinct returns ⇒ degenerate (flat/illiquid) window
  wasserstein_order: 2             # p in the p-Wasserstein topological-change signal
  # Emitted feature columns (see TDA_FEATURES in src/features/tda.py):
  #   tda_wass_h1/h0, tda_bottleneck_h1   — change vs previous diagram (Souto's key feature)
  #   tda_pers_entropy_h0/h1, tda_n_loops_h1, tda_max/total_pers_*, tda_landscape_l2_h0/h1
  #   tda_degenerate                       — flat/illiquid-window flag

evaluation:
  train_start: "2020-01-01"
  oos_start:   "2022-01-01"        # ~2 years train, ~2 years OOS
  step_size: 30                    # walk-forward re-fit every 30 days
  loss_functions:
    - qlike                        # proper loss for volatility
    - mse_log_rv                   # MSE on log(RV)

turbulent_periods:
  - name: may_2021_crash
    start: "2021-05-12"
    end:   "2021-05-27"
  - name: ftx_collapse
    start: "2022-11-07"
    end:   "2022-11-16"
  - name: luna_crash
    start: "2022-05-08"
    end:   "2022-05-15"
